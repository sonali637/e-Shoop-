<!doctype html>
<html lang="en">
  <head>
    <!-- ✅ Character Set -->
    <meta charset="UTF-8" />

    <!-- ✅ Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title & SEO -->
    <title>E-Shop | Shop Fashion, Electronics & More</title>
    <meta
      name="description"
      content="Shop trendy fashion, electronics, and accessories at E-Shop. Fast delivery, secure payments, and best deals every day."
    />
    <meta
      name="keywords"
      content="E-Shop, online shopping, fashion, electronics, checkout, cart, India shopping"
    />
    <meta name="author" content="JSK Team" />

    <!-- ✅ Favicon (fixed type) -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- ✅ Fonts (optimized) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Slick Carousel -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick-theme.min.css"
    />

    <!-- ✅ Open Graph -->
    <meta property="og:title" content="E-Shop | Your Favorite Online Store" />
    <meta
      property="og:description"
      content="Discover trending products with the best deals. Fast delivery & secure checkout."
    />
    <meta property="og:image" content="https://eshop.debasish.xyz/image.png" />
    <meta property="og:url" content="https://eshop.debasish.xyz" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="E-Shop | Best Deals Online" />
    <meta
      name="twitter:description"
      content="Shop fashion & gadgets at unbeatable prices."
    />
    <meta name="twitter:image" content="https://eshop.debasish.xyz/image.png" />

    <!-- ✅ Theme Color (UPDATED to Indigo) -->
    <meta name="theme-color" content="#6366F1" />

  </head>

  <body class="font-[Poppins] bg-gray-50 text-gray-900 antialiased">
    
    <!-- App Root -->
    <div id="root"></div>

    <!-- Main JS -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  </body>
</html>
